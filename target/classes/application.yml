server:
  port: ${PORT:9092}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.internal[.properties]
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    properties:
      mail:
        smtp:
          auth: false
          ssl:
            trust: "*"

app:
  cors-origin: ${CORS_ORIGIN:http://localhost:9091}
  prod-url: ${PROD_URL:http://localhost:9091}
  core-server:
    port: ${CORE_SERVER_PORT:9093}
    name: ${CORE_SERVER_NAME:StubServer}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:changeme-access-secret}
    refresh-secret: ${JWT_REFRESH_SECRET:changeme-refresh-secret}
    reset-secret: ${JWT_RESET_SECRET:changeme-reset-secret}
    access-expires-seconds: ${JWT_ACCESS_EXPIRES:900}
    refresh-expires-seconds: ${JWT_REFRESH_EXPIRES:1296000}
    reset-expires-seconds: ${JWT_RESET_EXPIRES:900}
  server-log-dir: ${SERVER_LOG_DIR:./logs}
  reqresp-log-dir: ${REQRESP_LOG_DIR:./reqresplogs}
  dataset-paths: ${DATASET_PATHS:./datasets}
  batch:
    java-start: ${JAVA_START_BAT:start.bat}
    java-stop: ${JAVA_STOP_BAT:stop.bat}
  health-api: ${HEALTH_API:}
  db-type: ${DB_TYPE:oracle}
